<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>dbt for Data Engineers — Complete Guide</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0b1020;--card:#131a2f;--bg-3:#1f2a44;--text:#e6edf6;--dim:#93a4bf;--accent:#ff6b4a;--accent2:#fbbf24;--ok:#22c55e;--border:#2a3553;--code:#0a0f1e}
  body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0b1020,#1a1008);color:var(--text);line-height:1.65}
  .container{max-width:1280px;margin:0 auto;padding:24px}
  header{background:linear-gradient(135deg,#ff6b4a,#f97316,#eab308);border-radius:16px;padding:32px;margin-bottom:24px;color:#1a1008}
  header h1{font-size:30px} header p{opacity:.85}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;background:var(--card);padding:8px;border-radius:12px;border:1px solid var(--border)}
  .tab{padding:9px 14px;background:transparent;color:var(--dim);border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a1008}
  .tab-content{display:none}.tab-content.active{display:block}
  .section{background:var(--card);border-radius:12px;padding:22px;margin-bottom:16px;border:1px solid var(--border)}
  .section h2{color:var(--accent);font-size:20px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
  .section h3{color:var(--accent2);font-size:16px;margin:14px 0 8px}
  pre[class*="language-"]{background:var(--code)!important;padding:12px!important;border-radius:8px;font-size:12px;border:1px solid var(--border);overflow-x:auto}
  :not(pre)>code{background:var(--bg-3);padding:2px 6px;border-radius:4px;color:var(--accent);font-size:12px}
  .check-row{display:flex;gap:10px;padding:8px;background:#0a0f1e;border-radius:6px;margin:4px 0;border-left:3px solid var(--accent)}
  .check-row label{font-size:13px;cursor:pointer}
  .alert{padding:12px;border-radius:8px;margin:10px 0;border-left:4px solid;font-size:14px}
  .alert.info{background:rgba(255,107,74,.1);border-color:var(--accent)}
  table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
  th,td{padding:8px 10px;border-bottom:1px solid var(--border)}
  th{background:var(--bg-3);color:var(--accent);font-size:11px;text-transform:uppercase}
  .btn{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;margin-right:8px}
  .progress-section{background:var(--card);padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid var(--border)}
  .progress-bar{background:#0a0f1e;height:12px;border-radius:6px;overflow:hidden;margin-top:8px}
  .progress-fill{background:linear-gradient(90deg,#22c55e,#ff6b4a);height:100%;width:0%;font-size:10px;text-align:right;padding-right:6px;color:#fff}
</style>
</head>
<body>
<div class="container">
<header><h1>🔧 dbt (data build tool) for Data Engineers</h1><p>Transform data in your warehouse with SQL + Jinja — models, tests, docs, snapshots.</p></header>
<div class="progress-section"><strong>Progress</strong> <span id="progress-text"></span><div class="progress-bar"><div class="progress-fill" id="progress-fill">0%</div></div>
<button class="btn" onclick="exportProgress()">Export</button><button class="btn" onclick="resetProgress()">Reset</button></div>
<div class="tabs" id="tab-bar"></div>
<div id="tab-panels"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
<script>
const TABS=[
{id:"overview",label:"Overview",html:`<div class="section"><h2>What is dbt?</h2>
<p>dbt runs <strong>SELECT statements</strong> in your warehouse (Snowflake, BigQuery, Redshift) and materializes results as tables/views. It adds:</p>
<ul style="color:var(--dim);padding-left:20px"><li>Version control for SQL transforms</li><li>Dependency graph (DAG)</li><li>Tests (unique, not_null, relationships)</li><li>Documentation</li><li>Macros (reusable SQL/Jinja)</li></ul>
<div class="alert info"><strong>ELT pattern:</strong> Extract+Load (Glue/Lambda/Airflow) → <strong>Transform (dbt)</strong> in Snowflake.</div>
<pre><code class="language-bash">pip install dbt-core dbt-snowflake
dbt init my_project
dbt debug
dbt run
dbt test
dbt docs generate && dbt docs serve</code></pre></div>`},
{id:"project",label:"Project Structure",html:`<div class="section"><h2>Folder layout</h2>
<pre><code>my_dbt_project/
├── dbt_project.yml
├── profiles.yml          # connection (often ~/.dbt/)
├── models/
│   ├── staging/          # 1:1 with sources, light cleaning
│   │   └── stg_orders.sql
│   ├── intermediate/     # business logic joins
│   └── marts/            # final star schema for BI
│       └── fct_orders.sql
├── seeds/                # CSV → table
├── snapshots/            # SCD Type 2
├── tests/                # singular tests
├── macros/
└── analyses/</code></pre>
<pre><code class="language-yaml"># dbt_project.yml
name: de_project
version: 1.0.0
profile: de_project
model-paths: ["models"]
target-path: "target"

models:
  de_project:
    staging:
      +materialized: view
    marts:
      +materialized: table
      +schema: marts</code></pre>
<div class="check-row"><input type="checkbox" id="d1"><label for="d1">Understand staging → marts layers</label></div></div>`},
{id:"models",label:"Models & ref()",html:`<div class="section"><h2>Models</h2>
<pre><code class="language-sql">-- models/staging/stg_orders.sql
{{ config(materialized='view') }}

with source as (
    select * from {{ source('raw', 'orders') }}
),
renamed as (
    select
        id as order_id,
        customer_id,
        amount::decimal(18,2) as amount,
        order_date::date as order_date
    from source
    where amount > 0
)
select * from renamed</code></pre>
<pre><code class="language-sql">-- models/marts/fct_orders.sql
{{ config(materialized='table', tags=['daily']) }}

select
    o.order_id,
    o.customer_id,
    c.customer_name,
    o.amount,
    o.order_date
from {{ ref('stg_orders') }} o
left join {{ ref('dim_customers') }} c on o.customer_id = c.customer_id</code></pre>
<h3>sources.yml</h3>
<pre><code class="language-yaml">version: 2
sources:
  - name: raw
    database: DE_LAKE
    schema: RAW
    tables:
      - name: orders
        loaded_at_field: _loaded_at
        freshness:
          warn_after: {count: 24, period: hour}</code></pre>
<div class="check-row"><input type="checkbox" id="d2"><label for="d2">source() and ref()</label></div>
<div class="check-row"><input type="checkbox" id="d3"><label for="d3">materialized: view / table / incremental</label></div></div>`},
{id:"incremental",label:"Incremental",html:`<div class="section"><h2>Incremental models</h2>
<pre><code class="language-sql">{{ config(
    materialized='incremental',
    unique_key='order_id',
    incremental_strategy='merge'  # snowflake
) }}

select * from {{ ref('stg_orders') }}

{% if is_incremental() %}
  where updated_at > (select max(updated_at) from {{ this }})
{% endif %}</code></pre>
<p style="color:var(--dim)">Strategies: <code>append</code>, <code>merge</code> (upsert), <code>delete+insert</code> — depends on adapter.</p>
<div class="check-row"><input type="checkbox" id="d4"><label for="d4">is_incremental() pattern</label></div></div>`},
{id:"tests",label:"Tests & Quality",html:`<div class="section"><h2>Testing</h2>
<pre><code class="language-yaml"># models/marts/schema.yml
version: 2
models:
  - name: fct_orders
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customers')
              field: customer_id
      - name: amount
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1000000</code></pre>
<pre><code class="language-sql">-- tests/assert_positive_revenue.sql (singular test)
select order_id from {{ ref('fct_orders') }} where amount &lt; 0</code></pre>
<pre><code class="language-bash">dbt test
dbt test --select fct_orders</code></pre>
<div class="check-row"><input type="checkbox" id="d5"><label for="d5">schema tests: unique, not_null, relationships</label></div></div>`},
{id:"snapshots",label:"Snapshots (SCD2)",html:`<div class="section"><h2>Snapshots</h2>
<pre><code class="language-sql">{% snapshot customers_snapshot %}
{{
    config(
      target_schema='snapshots',
      unique_key='customer_id',
      strategy='timestamp',
      updated_at='updated_at',
    )
}}
select * from {{ source('raw', 'customers') }}
{% endsnapshot %}</code></pre>
<pre><code class="language-bash">dbt snapshot</code></pre>
<p>Creates SCD Type 2 table with <code>dbt_valid_from</code>, <code>dbt_valid_to</code>, <code>dbt_scd_id</code>.</p>
<div class="check-row"><input type="checkbox" id="d6"><label for="d6">timestamp vs check strategy</label></div></div>`},
{id:"jinja",label:"Jinja & Macros",html:`<div class="section"><h2>Jinja in SQL</h2>
<pre><code class="language-sql">{% set payment_methods = ['credit_card', 'upi', 'cash'] %}

select
    order_id,
    {% for method in payment_methods %}
    sum(case when payment_method = '{{ method }}' then amount end) as {{ method }}_amount
    {{ "," if not loop.last }}
    {% endfor %}
from {{ ref('stg_orders') }}
group by 1</code></pre>
<pre><code class="language-sql">-- macros/generate_schema_name.sql
{% macro cents_to_dollars(column_name) %}
    ({{ column_name }} / 100.0)::decimal(18,2)
{% endmacro %}</code></pre>
<div class="check-row"><input type="checkbox" id="d7"><label for="d7">for loops and macros</label></div></div>`},
{id:"cicd",label:"CI/CD & Airflow",html:`<div class="section"><h2>Run dbt in production</h2>
<pre><code class="language-bash"># GitHub Actions
dbt deps
dbt run --select state:modified+ --defer  # slim CI
dbt test</code></pre>
<pre><code class="language-python"># Airflow: BashOperator or Cosmos (astronomer-cosmos)
dbt_run = BashOperator(
    task_id='dbt_run',
    bash_command='cd /opt/dbt && dbt run --profiles-dir .',
)</code></pre>
<p>Free course: <a href="https://courses.getdbt.com" style="color:var(--accent)">courses.getdbt.com</a></p>
<div class="check-row"><input type="checkbox" id="d8"><label for="d8">Run dbt from Airflow</label></div></div>`},
{id:"interview",label:"Interview",html:`<div class="section"><h2>Q&A</h2>
<p><strong>dbt vs stored procedures?</strong> dbt = versioned, tested, documented SQL in Git; better for team DE workflows.</p>
<p><strong>staging vs marts?</strong> Staging = clean raw 1:1. Marts = business-ready facts/dims.</p>
<p><strong>incremental vs table?</strong> Incremental for large fact tables with new rows daily; full table for small dims.</p>
<p><strong>dbt Core vs Cloud?</strong> Core = CLI free. Cloud = UI, scheduling, observability (paid).</p></div>`}
];
const STORAGE_KEY='dbt_guide_v1';
function buildTabs(){const bar=document.getElementById('tab-bar'),panels=document.getElementById('tab-panels');
TABS.forEach((t,i)=>{const b=document.createElement('button');b.className='tab'+(i===0?' active':'');b.dataset.tab=t.id;b.textContent=t.label;b.onclick=e=>showTab(e,t.id);bar.appendChild(b);
const d=document.createElement('div');d.className='tab-content'+(i===0?' active':'');d.id=t.id;d.innerHTML=t.html;panels.appendChild(d);});}
function showTab(evt,id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');evt.currentTarget.classList.add('active');history.replaceState(null,'','#'+id);if(window.Prism)Prism.highlightAll();}
function initHash(){const h=location.hash.slice(1);if(!h)return;const b=document.querySelector(`.tab[data-tab="${h}"]`);if(b)showTab({currentTarget:b},h);}
function updateProgress(){const all=document.querySelectorAll('input[type=checkbox]'),done=document.querySelectorAll('input[type=checkbox]:checked');const p=all.length?Math.round(done.length/all.length*100):0;document.getElementById('progress-fill').style.width=p+'%';document.getElementById('progress-fill').textContent=p+'%';document.getElementById('progress-text').textContent=done.length+'/'+all.length;}
function saveProgress(){const s={};document.querySelectorAll('input[type=checkbox]').forEach(c=>{if(c.checked)s[c.id]=1});localStorage.setItem(STORAGE_KEY,JSON.stringify(s));updateProgress();}
function loadProgress(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');document.querySelectorAll('input[type=checkbox]').forEach(c=>{if(s[c.id])c.checked=true});}catch(e){}updateProgress();}
function resetProgress(){if(confirm('Reset?')){localStorage.removeItem(STORAGE_KEY);document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);updateProgress();}}
function exportProgress(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([localStorage.getItem(STORAGE_KEY)||'{}']));a.download='dbt_progress.json';a.click();}
document.addEventListener('change',e=>{if(e.target.matches('input[type=checkbox]'))saveProgress();});
buildTabs();loadProgress();initHash();window.addEventListener('hashchange',initHash);if(window.Prism)Prism.highlightAll();
</script>
</body>
</html>
