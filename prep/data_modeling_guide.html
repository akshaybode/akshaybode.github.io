<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Modeling for Data Engineers</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#0b1020;--card:#131a2f;--bg-3:#1f2a44;--text:#e6edf6;--dim:#93a4bf;--accent:#e879f9;--accent2:#c084fc;--border:#2a3553;--code:#0a0f1e}
  body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,#0b1020,#1a0a20);color:var(--text);line-height:1.65}
  .container{max-width:1280px;margin:0 auto;padding:24px}
  header{background:linear-gradient(135deg,#e879f9,#a855f7,#6366f1);border-radius:16px;padding:32px;margin-bottom:24px}
  header h1{font-size:30px}
  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;background:var(--card);padding:8px;border-radius:12px;border:1px solid var(--border)}
  .tab{padding:9px 14px;background:transparent;color:var(--dim);border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
  .tab-content{display:none}.tab-content.active{display:block}
  .section{background:var(--card);border-radius:12px;padding:22px;margin-bottom:16px;border:1px solid var(--border)}
  .section h2{color:var(--accent);font-size:20px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:8px}
  pre[class*="language-"]{background:var(--code)!important;padding:12px!important;border-radius:8px;font-size:12px;border:1px solid var(--border)}
  .check-row{display:flex;gap:10px;padding:8px;background:#0a0f1e;border-radius:6px;margin:4px 0;border-left:3px solid var(--accent)}
  .check-row label{font-size:13px;cursor:pointer}
  table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
  th,td{padding:8px 10px;border-bottom:1px solid var(--border)}
  th{background:var(--bg-3);color:var(--accent);font-size:11px;text-transform:uppercase}
  .btn{background:var(--bg-3);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:12px;margin-right:8px}
  .progress-section{background:var(--card);padding:16px;border-radius:12px;margin-bottom:16px;border:1px solid var(--border)}
  .progress-bar{background:#0a0f1e;height:12px;border-radius:6px;overflow:hidden;margin-top:8px}
  .progress-fill{background:linear-gradient(90deg,#22c55e,#e879f9);height:100%;width:0%;font-size:10px;text-align:right;padding-right:6px;color:#fff}
</style>
</head>
<body>
<div class="container">
<header><h1>📐 Data Modeling for Data Engineers</h1><p>Kimball, star schema, SCD, medallion architecture, normalization — interview & production essentials.</p></header>
<div class="progress-section"><strong>Progress</strong> <span id="progress-text"></span><div class="progress-bar"><div class="progress-fill" id="progress-fill">0%</div></div>
<button class="btn" onclick="exportProgress()">Export</button><button class="btn" onclick="resetProgress()">Reset</button></div>
<div class="tabs" id="tab-bar"></div>
<div id="tab-panels"></div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-sql.min.js"></script>
<script>
const TABS=[
{id:"overview",label:"Overview",html:`<div class="section"><h2>OLTP vs OLAP</h2>
<table><tr><th></th><th>OLTP</th><th>OLAP</th></tr>
<tr><td>Purpose</td><td>Transactions (app DB)</td><td>Analytics (warehouse)</td></tr>
<tr><td>Schema</td><td>Normalized (3NF)</td><td>Denormalized (star)</td></tr>
<tr><td>Writes</td><td>Many small</td><td>Batch bulk loads</td></tr>
<tr><td>Reads</td><td>Point lookups</td><td>Aggregations</td></tr></table>
<p>DE builds the <strong>OLAP</strong> layer. See also <a href="advanced_sql_guide.html#de-sql" style="color:var(--accent)">SQL DE patterns</a>.</p></div>`},
{id:"kimball",label:"Kimball / Star",html:`<div class="section"><h2>Star schema</h2>
<ul style="color:var(--dim);padding-left:20px">
<li><strong>Fact table</strong> — measures (amount, qty) + foreign keys to dims</li>
<li><strong>Dimension tables</strong> — descriptive attributes (customer, product, date)</li>
<li><strong>Grain</strong> — what one row represents (e.g., one line item per order)</li>
</ul>
<pre><code class="language-sql">-- Fact: fct_sales (grain: order line)
-- Dim: dim_customer, dim_product, dim_date

SELECT d.year, c.region, SUM(f.amount) AS revenue
FROM fct_sales f
JOIN dim_date d ON f.date_key = d.date_key
JOIN dim_customer c ON f.customer_key = c.customer_key
GROUP BY 1, 2;</code></pre>
<p><strong>Snowflake schema</strong> = normalized dimensions (sub-dim tables). More joins, less redundancy.</p>
<div class="check-row"><input type="checkbox" id="m1"><label for="m1">Fact vs dimension, grain</label></div></div>`},
{id:"scd",label:"SCD Types",html:`<div class="section"><h2>Slowly Changing Dimensions</h2>
<table><tr><th>Type</th><th>Behavior</th><th>When</th></tr>
<tr><td>Type 1</td><td>Overwrite — no history</td><td>Typos, non-critical</td></tr>
<tr><td>Type 2</td><td>New row per version — full history</td><td>Most common for dims</td></tr>
<tr><td>Type 3</td><td>Previous value column</td><td>Limited history</td></tr></table>
<p>Implement in SQL: <a href="advanced_sql_guide.html#de-sql" style="color:var(--accent)">advanced_sql_guide → DE Patterns</a></p>
<p>Implement in dbt: <a href="dbt_guide.html#snapshots" style="color:var(--accent)">dbt snapshots</a></p>
<div class="check-row"><input type="checkbox" id="m2"><label for="m2">SCD 1/2/3 explained</label></div></div>`},
{id:"medallion",label:"Medallion",html:`<div class="section"><h2>Bronze / Silver / Gold</h2>
<table><tr><th>Layer</th><th>Also called</th><th>Content</th></tr>
<tr><td>Bronze</td><td>Raw</td><td>As-is from source, append-only</td></tr>
<tr><td>Silver</td><td>Curated</td><td>Cleaned, typed, deduped</td></tr>
<tr><td>Gold</td><td>Marts</td><td>Business metrics, star schema</td></tr></table>
<pre><code>s3://lake/bronze/orders/
s3://lake/silver/orders/
snowflake.marts.fct_orders</code></pre>
<div class="check-row"><input type="checkbox" id="m3"><label for="m3">Medallion layers mapped to S3 + Snowflake</label></div></div>`},
{id:"interview",label:"Interview",html:`<div class="section"><h2>Q&A</h2>
<p><strong>Surrogate key vs natural key?</strong> Surrogate = warehouse-generated ID (stable). Natural = business key (can change).</p>
<p><strong>Factless fact table?</strong> Records events without measures (e.g., student attendance).</p>
<p><strong>Degenerate dimension?</strong> Dimension attribute stored in fact (e.g., order_number on line item).</p>
<p>Book: The Data Warehouse Toolkit (Kimball).</p></div>`}
];
const STORAGE_KEY='modeling_guide_v1';
function buildTabs(){const bar=document.getElementById('tab-bar'),panels=document.getElementById('tab-panels');
TABS.forEach((t,i)=>{const b=document.createElement('button');b.className='tab'+(i===0?' active':'');b.dataset.tab=t.id;b.textContent=t.label;b.onclick=e=>showTab(e,t.id);bar.appendChild(b);
const d=document.createElement('div');d.className='tab-content'+(i===0?' active':'');d.id=t.id;d.innerHTML=t.html;panels.appendChild(d);});}
function showTab(evt,id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(id).classList.add('active');evt.currentTarget.classList.add('active');history.replaceState(null,'','#'+id);if(window.Prism)Prism.highlightAll();}
function initHash(){const h=location.hash.slice(1);if(!h)return;const b=document.querySelector(`.tab[data-tab="${h}"]`);if(b)showTab({currentTarget:b},h);}
function updateProgress(){const all=document.querySelectorAll('input[type=checkbox]'),done=document.querySelectorAll('input[type=checkbox]:checked');const p=all.length?Math.round(done.length/all.length*100):0;document.getElementById('progress-fill').style.width=p+'%';document.getElementById('progress-fill').textContent=p+'%';document.getElementById('progress-text').textContent=done.length+'/'+all.length;}
function saveProgress(){const s={};document.querySelectorAll('input[type=checkbox]').forEach(c=>{if(c.checked)s[c.id]=1});localStorage.setItem(STORAGE_KEY,JSON.stringify(s));updateProgress();}
function loadProgress(){try{const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');document.querySelectorAll('input[type=checkbox]').forEach(c=>{if(s[c.id])c.checked=true});}catch(e){}updateProgress();}
function resetProgress(){if(confirm('Reset?')){localStorage.removeItem(STORAGE_KEY);document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);updateProgress();}}
function exportProgress(){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([localStorage.getItem(STORAGE_KEY)||'{}']));a.download='modeling_progress.json';a.click();}
document.addEventListener('change',e=>{if(e.target.matches('input[type=checkbox]'))saveProgress();});
buildTabs();loadProgress();initHash();window.addEventListener('hashchange',initHash);if(window.Prism)Prism.highlightAll();
</script>
</body>
</html>
